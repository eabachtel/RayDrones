<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>The Drone Guy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#1C1E25;
--bg2:#14161c;
--card:rgba(255,255,255,0.05);
--stroke:rgba(255,255,255,0.14);
--text:#D9D9D9;
--muted:#9FA3AA;
--accent:#B4D455;
--shadow:0 18px 60px rgba(0,0,0,0.55);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Outfit,system-ui;
color:var(--text);
background:
radial-gradient(900px 560px at 18% 0%, rgba(180,212,85,0.12), transparent 62%),
radial-gradient(900px 560px at 95% 25%, rgba(180,212,85,0.06), transparent 70%),
linear-gradient(180deg,var(--bg),var(--bg2));
display:flex;
justify-content:center;
padding:20px;
}

.wrap{
width:100%;
max-width:700px;
}

.header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:10px;
}

.logo{
width:48px;
height:48px;
border-radius:12px;
background:rgba(180,212,85,0.15);
border:1px solid rgba(180,212,85,0.35);
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
width:36px;
height:36px;
}

.title{
font-size:32px;
font-weight:800;
}

.headline{
text-align:center;
margin:10px 0 18px;
font-size:14px;
}

.accent{
color:var(--accent);
font-weight:700;
}

.reel{
border-radius:20px;
overflow:hidden;
border:1px solid var(--stroke);
background:var(--card);
min-height:260px;
margin-bottom:18px;
position:relative;
}

.reel video,
.reel img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.buttons{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

.btn{
border:1px solid rgba(255,255,255,0.18);
background:rgba(255,255,255,0.06);
padding:12px 18px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:600;
font-size:14px;
}

.btnPrimary{
background:linear-gradient(135deg,#B4D455,#8FAE3C);
color:black;
border:none;
}

.contact{
text-align:center;
background:var(--card);
border:1px solid var(--stroke);
border-radius:20px;
padding:18px;
}

.contact p{
margin:6px 0;
}

.contactButtons{
margin-top:12px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.footer{
margin-top:12px;
text-align:center;
font-size:12px;
color:rgba(255,255,255,0.6);
}

@media(min-width:800px){

.wrap{
max-width:1000px;
}

.layout{
display:grid;
grid-template-columns:1.5fr .7fr;
gap:20px;
align-items:start;
}

.reel{
min-height:380px;
margin-bottom:0;
}

.contact{
text-align:left;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="header">

<div class="logo">
<img src="drone-logo.png">
</div>

<div class="title">
The Drone Guy
</div>

</div>

<div class="headline">
<span class="accent">Professional</span> Drone Footage,
<span class="accent">Clean</span> delivery, and
<span class="accent">Fast</span> Turnaround.
</div>

<div class="layout">

<div>

<div class="reel" id="reel">

<video autoplay muted loop playsinline>
<source src="reel1.mp4" type="video/mp4">
</video>

</div>

<div class="buttons">

<a class="btn btnPrimary" href="#contact">
Book Now
</a>

<a class="btn" href="https://instagram.com/the.drone.guy.five" target="_blank">
Instagram
</a>

<a class="btn" href="https://tiktok.com/@the.drone.guy.4" target="_blank">
TikTok
</a>

</div>

</div>

<div class="contact" id="contact">

<p><strong>Raymond Price</strong></p>

<p>910-939-8560</p>

<p>thedroneguyfive@gmail.com</p>

<div class="contactButtons">

<a class="btn btnPrimary"
href="mailto:thedroneguyfive@gmail.com?subject=Drone Booking Request">
Email
</a>

<a class="btn"
href="tel:9109398560">
Call
</a>

</div>

</div>

</div>

<div class="footer">
© 2026 The Drone Guy
</div>

</div>

</body>
</html>
