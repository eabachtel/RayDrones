<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>The Drone Guy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#1C1E25;
--bg2:#14161c;
--card:rgba(255,255,255,0.05);
--stroke:rgba(255,255,255,0.14);
--text:#D9D9D9;
--accent:#B4D455;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Outfit,system-ui;
color:var(--text);
background:
radial-gradient(900px 560px at 18% 0%, rgba(180,212,85,0.12), transparent 62%),
linear-gradient(180deg,var(--bg),var(--bg2));
display:flex;
justify-content:center;
padding:20px;
}

.wrap{
width:100%;
max-width:700px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:6px;
}

.logo{
width:46px;
height:46px;
border-radius:12px;
background:rgba(180,212,85,0.15);
border:1px solid rgba(180,212,85,0.35);
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
width:34px;
}

.title{
font-size:32px;
font-weight:800;
}

/* HEADLINE */

.headline{
text-align:center;
font-size:14px;
margin:10px 0 18px;
}

.accent{
color:var(--accent);
font-weight:700;
}

/* ACTION BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:18px;
}

.btn{
border:1px solid rgba(255,255,255,0.18);
background:rgba(255,255,255,0.06);
padding:12px 18px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:600;
font-size:14px;
}

.btnPrimary{
background:linear-gradient(135deg,#B4D455,#8FAE3C);
color:black;
border:none;
}

/* REEL */

.carousel{
border-radius:20px;
overflow:hidden;
border:1px solid var(--stroke);
background:var(--card);
margin-bottom:20px;
position:relative;
}

.carousel-track{
display:flex;
transition:transform .4s ease;
}

.slide{
min-width:100%;
height:280px;
}

.slide video,
.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* dots */

.dots{
display:flex;
justify-content:center;
gap:6px;
padding:10px;
}

.dot{
width:8px;
height:8px;
border-radius:100px;
background:rgba(255,255,255,.3);
}

.dot.active{
background:var(--accent);
}

/* CONTACT */

.contact{
text-align:center;
background:var(--card);
border:1px solid var(--stroke);
border-radius:18px;
padding:18px;
}

.contactButtons{
margin-top:12px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.footer{
margin-top:14px;
text-align:center;
font-size:12px;
color:rgba(255,255,255,.6);
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">

<div class="logo">
<img src="drone-logo.png">
</div>

<div class="title">
The Drone Guy
</div>

</div>

<div class="headline">
<span class="accent">Professional</span> drone footage,
<span class="accent">clean</span> delivery,
and <span class="accent">fast</span> turnaround.
</div>

<!-- BUTTONS ABOVE REEL -->

<div class="buttons">

<a class="btn btnPrimary" href="#contact">
Book Now
</a>

<a class="btn" href="https://instagram.com/the.drone.guy.five" target="_blank">
Instagram
</a>

<a class="btn" href="https://tiktok.com/@the.drone.guy.4" target="_blank">
TikTok
</a>

</div>

<!-- SWIPEABLE REEL -->

<div class="carousel">

<div class="carousel-track" id="track">

<div class="slide">
<video autoplay muted loop playsinline>
<source src="reel1.mp4" type="video/mp4">
</video>
</div>

<div class="slide">
<img src="reel2.jpg">
</div>

<div class="slide">
<video autoplay muted loop playsinline>
<source src="reel3.mp4" type="video/mp4">
</video>
</div>

</div>

<div class="dots" id="dots"></div>

</div>

<!-- CONTACT -->

<div class="contact" id="contact">

<p><strong>Ray Price</strong></p>

<p>910-939-8560</p>

<p>thedroneguyfive@gmail.com</p>

<div class="contactButtons">

<a class="btn btnPrimary"
href="mailto:thedroneguyfive@gmail.com?subject=Drone Booking Request">
Email
</a>

<a class="btn"
href="tel:9109398560">
Call
</a>

</div>

</div>

<div class="footer">
© 2026 The Drone Guy
</div>

</div>

<script>

/* Carousel */

const track=document.getElementById("track")
const slides=document.querySelectorAll(".slide")
const dotsContainer=document.getElementById("dots")

let index=0

slides.forEach((_,i)=>{
let d=document.createElement("div")
d.className="dot"
dotsContainer.appendChild(d)
})

const dots=document.querySelectorAll(".dot")

function update(){
track.style.transform=`translateX(-${index*100}%)`
dots.forEach(d=>d.classList.remove("active"))
dots[index].classList.add("active")
}

update()

/* swipe */

let startX=0

track.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

track.addEventListener("touchend",e=>{
let diff=startX-e.changedTouches[0].clientX

if(diff>50 && index<slides.length-1) index++
if(diff<-50 && index>0) index--

update()
})

</script>

</body>
</html>
