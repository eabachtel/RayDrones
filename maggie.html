<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Maggie | Official Drone Guest</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
    }
    .maggie{
    width:120px;
    animation:wag 0.7s infinite ease-in-out;
    transform-origin:85% 75%;
    }
    @keyframes wag{

0%{
transform:rotate(6deg);
}

50%{
transform:rotate(-6deg);
}

100%{
transform:rotate(6deg);
}

}
    body{
      text-align:center;
    }

    .hero{
      position:relative;
      min-height:100vh;
      background-image:url("maggie.jpg");
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .overlay{
      position:relative;
      z-index:2;
      background:rgba(0,0,0,0.6);
      padding:40px 20px 150px;
      border-radius:20px;
      max-width:400px;
      width:90%;
    }

    h1{
      margin-top:0;
      margin-bottom:12px;
      font-size:32px;
      line-height:1.1;
    }

    p{
      font-size:16px;
      opacity:0.95;
      line-height:1.5;
      margin:0;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .btn{
      padding:14px 16px;
      border-radius:14px;
      text-decoration:none;
      font-size:16px;
      font-weight:bold;
      display:block;
      transition:transform 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:0.96;
    }

    .primary{
      background:#B4D455;
      color:black;
    }

    .secondary{
      background:white;
      color:black;
    }

    /* Maggie mascot replacing paw prints */
    .maggie-mascot{
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      width:160px;
      z-index:3;
      pointer-events:none;
    }

    .maggie-body{
      width:100%;
      position:relative;
      z-index:2;
      display:block;
    }

    .maggie-tail{
      position:absolute;
      right:-8px;
      bottom:42px;
      width:60px;
      z-index:1;
      transform-origin:15% 85%;
      animation:wag 0.6s infinite ease-in-out;
    }

    @keyframes wag{
      0%{ transform:rotate(15deg); }
      50%{ transform:rotate(-15deg); }
      100%{ transform:rotate(15deg); }
    }

    .gallery{
      padding:40px 20px;
      background:#111;
    }

    .gallery h2{
      margin-top:0;
      margin-bottom:20px;
      font-size:28px;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:20px;
      max-width:1000px;
      margin:0 auto;
    }

    .gallery img{
      width:100%;
      border-radius:14px;
      display:block;
    }

    @media (min-width:768px){
      .gallery-grid{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width:768px){
      .overlay{
        padding:32px 18px 130px;
        max-width:360px;
      }

      h1{
        font-size:28px;
      }

      p{
        font-size:15px;
      }

      .maggie-mascot{
        width:130px;
        bottom:14px;
      }

      .maggie-tail{
        width:48px;
        right:-6px;
        bottom:34px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">

    <div class="overlay">
      <h1>🐾 Hi, I’m Maggie</h1>

      <p>
        I’m the cute one.<br>
        Want to meet my pilot?
      </p>

      <div class="buttons">
        <a class="btn primary" href="index.html">🚁 Meet My Pilot</a>
        <a class="btn secondary" href="#gallery">🐶 See More Maggie</a>
      </div>
    </div>

    <!-- Maggie mascot goes where paw prints were -->
    <div class="maggie-mascot">
      <img src="maggie-tail.png" class="maggie-tail" alt="">
      <img src="maggie-body.png" class="maggie-body" alt="Maggie mascot">
    </div>

  </div>

  <div class="gallery" id="gallery">
    <h2>Maggie’s Adventures</h2>

    <div class="gallery-grid">
      <img src="maggie1.jpg" alt="Maggie photo 1">
      <img src="maggie2.jpg" alt="Maggie photo 2">
      <img src="maggie3.jpg" alt="Maggie photo 3">
    </div>
  </div>

</body>
</html>
