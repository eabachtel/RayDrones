<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Maggie | Official Drone Doggie</title>

<style>
.maggie-mascot{
position:absolute;
bottom:0;
left:20px;
width:140px;
z-index:10;
pointer-events:none;
}
body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
background:black;
}

.hero{
height:100vh;
background-image:url("maggie.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}
.maggie-mascot{
animation:bounce 3s infinite ease-in-out;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.overlay{
background:rgba(0,0,0,.6);
padding:40px 20px;
border-radius:20px;
max-width:400px;
}

h1{
margin-top:0;
font-size:32px;
}

p{
font-size:16px;
opacity:.9;
}

.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

button, a{
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
font-weight:bold;
text-decoration:none;
}

.primary{
background:#B4D455;
color:black;
}

.secondary{
background:white;
color:black;
}

.gallery{
padding:40px 20px;
background:#111;
}

.gallery img{
width:100%;
border-radius:12px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="hero">
    <img src="maggie-mascot.png"
  class="maggie-mascot">
<div class="overlay">

<h1>🐾 Hi I'm Maggie</h1>

<p>
I'm the <b>Official Drone Doggie</b>.<br>
I travel to car shows with <b>The Drone Guy</b>.
</p>

<div class="buttons">

<a class="primary" href="/RayDrones">
🚁 Meet My Pilot
</a>

<a class="secondary" href="#gallery">
🐶 See Maggie's Adventures
</a>

</div>

</div>

</div>

<div class="gallery" id="gallery">

<img src="maggie1.jpg">
<img src="maggie2.jpg">
<img src="maggie3.jpg">

</div>

</body>
</html>
