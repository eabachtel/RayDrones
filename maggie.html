<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maggie</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: #0a0d14;
      border-radius: 34px;
      padding: 28px 22px 26px;
    }

    .maggie-wrap {
      position: relative;
      width: 290px;
      height: 215px;
      margin: 0 auto 10px;
    }

    .maggie-body {
      position: absolute;
      left: 0;
      top: 0;
      width: 290px;
      z-index: 2;
      display: block;
    }

    .maggie-tail {
      position: absolute;
      right: 16px;
      top: 54px;
      width: 68px;
      z-index: 1;
      transform-origin: 10% 78%;
      animation: wag 0.55s infinite ease-in-out;
    }

    @keyframes wag {
      0% { transform: rotate(-18deg); }
      50% { transform: rotate(18deg); }
      100% { transform: rotate(-18deg); }
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0 0 26px;
      font-size: 17px;
      color: rgba(255,255,255,0.82);
    }

    .button {
      display: block;
      width: 100%;
      padding: 20px 18px;
      margin-top: 14px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
    }

    .primary {
      background: #b6d34d;
      color: #000;
    }

    .secondary {
      background: #ececec;
      color: #000;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
        padding: 24px 18px 22px;
      }

      .maggie-wrap {
        width: 250px;
        height: 190px;
      }

      .maggie-body {
        width: 250px;
      }

      .maggie-tail {
        width: 58px;
        right: 14px;
        top: 47px;
      }

      h1 {
        font-size: 29px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="maggie-wrap">
      <img src="maggie-tail.png" class="maggie-tail" alt="">
      <img src="maggie-body.png" class="maggie-body" alt="Maggie">
    </div>

    <h1>Hi, I'm Maggie</h1>
    <p class="subtitle">I'm the cute one!</p>

    <a href="index.html" class="button primary">🚁 Meet My Pilot</a>
    <a href="https://instagram.com/maggie.sox" class="button secondary" target="_blank" rel="noopener">🐶 See More Maggie</a>
  </div>

</body>
</html>
