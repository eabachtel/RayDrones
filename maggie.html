<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maggie</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.card{
  background:#050b16;
  padding:30px 24px;
  border-radius:40px;
  width:100%;
  max-width:420px;
  min-height:760px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.maggie-wrap{
  position:relative;
  width:300px;
  max-width:100%;
  height:330px;
  margin-bottom:10px;
}

.maggie-body{
  position:absolute;
  width:260px;
  max-width:85%;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  z-index:2;
}

.maggie-tail{
  position:absolute;
  width:80px;
  max-width:25%;
  left:31%;
  top:43%;
  transform-origin:15% 80%;
  animation:wag .6s infinite ease-in-out;
  z-index:3;
}

@keyframes wag{
  0%{transform:rotate(-18deg);}
  50%{transform:rotate(18deg);}
  100%{transform:rotate(-18deg);}
}

h1{
  margin:0 0 6px;
  font-size:32px;
}

.subtitle{
  margin:0 0 28px;
  font-size:18px;
  color:#cccccc;
}

.button{
  display:block;
  width:100%;
  padding:20px;
  border-radius:20px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  margin-bottom:16px;
  box-sizing:border-box;
}

.primary{
  background:#b7d44b;
  color:black;
}

.secondary{
  background:#e6e6e6;
  color:black;
}

@media (max-width:480px){
  .card{
    min-height:auto;
    padding:25px 20px;
  }

  .maggie-wrap{
    height:330px;
  }

  h1{
    font-size:30px;
  }

  .button{
    font-size:17px;
    padding:18px;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="maggie-wrap">
    <img src="maggie-tail.png" class="maggie-tail" alt="Maggie's wagging tail">
    <img src="maggie-body.png" class="maggie-body" alt="Maggie the dog">
  </div>

  <h1>Hi, I'm Maggie</h1>
  <p class="subtitle">I'm the cute one!</p>

  <a href="index.html" class="button primary">🚁 Meet My Pilot</a>

  <a href="https://instagram.com/maggie.sox" target="_blank" class="button secondary">🐶 See More Maggie</a>

</div>

</body>
</html>
