<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maggie</title>

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#000;
      color:white;
      text-align:center;
    }

    .container{
      max-width:420px;
      margin:40px auto;
      background:#111216;
      padding:40px 20px 50px;
      border-radius:35px;
    }

    /* Maggie wrapper */

.maggie-wrap{
position:relative;
width:320px;
margin:0 auto 30px auto;
}

.maggie-body{
width:320px;
display:block;
margin:0 auto;
position:relative;
z-index:2;
}

.maggie-tail{
position:absolute;
right:-20px;
top:105px;
width:85px;
z-index:1;
transform-origin:12% 80%;
animation:wag 0.6s infinite ease-in-out;
}

@keyframes wag{
0% { transform:rotate(-18deg); }
50% { transform:rotate(18deg); }
100% { transform:rotate(-18deg); }

    

    h1{
      margin:0 0 10px 0;
      font-size:26px;
    }

    .subtitle{
      opacity:.92;
      margin-bottom:28px;
      font-size:16px;
    }

    .button{
      display:block;
      width:100%;
      padding:18px;
      margin-top:14px;
      border-radius:18px;
      font-size:18px;
      text-decoration:none;
      font-weight:bold;
      box-sizing:border-box;
    }

    .primary{
      background:#b4d455;
      color:black;
    }

    .secondary{
      background:white;
      color:black;
    }

    .gallery{
      max-width:420px;
      margin:0 auto 40px auto;
    }

    .gallery img{
      width:100%;
      border-radius:18px;
      margin-top:14px;
      display:block;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="maggie-wrap">
      <img src="maggie-tail.png" class="maggie-tail" alt="">
      <img src="maggie-body.png" class="maggie-body" alt="Maggie">
    </div>

    <h1>Hi, I'm Maggie</h1>

    <p class="subtitle">
      I'm the cute one!
    </p>

    <a href="index.html" class="button primary">🚁Meet My Pilot</a>
    <a href="https://instagram.com/maggie.sox" class="button secondary">🐶See More Maggie</a>

  </div>

  <div id="gallery" class="gallery">
    <img src="maggie1.jpg" alt="Maggie photo 1">
    <img src="maggie2.jpg" alt="Maggie photo 2">
    <img src="maggie3.jpg" alt="Maggie photo 3">
  </div>

</body>
</html>
