<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Maggie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{

background:#0c0f14;
width:90%;
max-width:420px;
padding:40px 30px;
border-radius:28px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.6);

}

/* MAGGIE WRAP */

.maggie-wrap{
position:relative;
width:340px;
margin:0 auto 10px auto;
}

/* BODY */

.maggie-body{
width:340px;
display:block;
margin:0 auto;
position:relative;
z-index:2;
}

/* TAIL */

.maggie-tail{

position:absolute;
right:-12px;
top:90px;
width:85px;
z-index:1;
transform-origin:10% 80%;
animation:wag .55s infinite ease-in-out;

}

@keyframes wag{

0%{transform:rotate(-20deg);}
50%{transform:rotate(20deg);}
100%{transform:rotate(-20deg);}

}

/* TEXT */

h1{
margin-top:5px;
font-size:32px;
}

p{
color:#cfcfcf;
margin-top:-10px;
margin-bottom:25px;
font-size:18px;
}

/* BUTTONS */

.button{

display:block;
text-decoration:none;
padding:18px;
border-radius:16px;
margin:12px 0;
font-weight:600;
font-size:18px;

}

.primary{

background:#b2d053;
color:black;

}

.secondary{

background:#e6e6e6;
color:black;

}

.button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="card">

<div class="maggie-wrap">

<img src="maggie-body.png" class="maggie-body">

<img src="maggie-tail.png" class="maggie-tail">

</div>

<h1>Hi, I'm Maggie</h1>

<p>I'm the cute one!</p>

<a href="https://eabachtel.github.io/RayDrones/" class="button primary">
🚁 Meet My Pilot
</a>

<a href="https://instagram.com/maggie.sox" class="button secondary">
🐶 See More Maggie
</a>

</div>

</body>
</html>
