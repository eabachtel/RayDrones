<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggie</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
padding:20px;
}

.card{
background:#050b16;
padding:40px 25px 35px;
border-radius:40px;
width:100%;
max-width:420px;
box-sizing:border-box;
}

/* Maggie container */

.maggie-wrap{
position:relative;
width:260px;
margin:0 auto 20px auto;
}

/* Maggie body now flows naturally */

.maggie-body{
width:260px;
display:block;
margin:auto;
}

/* Tail animation */

.maggie-tail{
position:absolute;
right:-10px;
top:70px;
width:60px;
transform-origin:10% 80%;
animation:wag .6s infinite ease-in-out;
}

@keyframes wag{
0%{transform:rotate(-18deg);}
50%{transform:rotate(18deg);}
100%{transform:rotate(-18deg);}
}

h1{
margin:10px 0 6px;
font-size:32px;
}

.subtitle{
margin:0 0 25px;
font-size:18px;
color:#cccccc;
}

.button{
display:block;
width:100%;
padding:20px;
border-radius:20px;
font-size:18px;
font-weight:bold;
text-decoration:none;
margin-bottom:16px;
}

.primary{
background:#b7d44b;
color:black;
}

.secondary{
background:#e6e6e6;
color:black;
}

</style>

</head>

<body>

<div class="card">

<div class="maggie-wrap">

<img src="maggie-body.png" class="maggie-body">

<img src="maggie-tail.png" class="maggie-tail">

</div>

<h1>Hi, I'm Maggie</h1>

<p class="subtitle">I'm the cute one!</p>

<a href="index.html" class="button primary">
🚁 Meet My Pilot
</a>

<a href="https://instagram.com/maggie.sox" target="_blank" class="button secondary">
🐶 See More Maggie
</a>

</div>

</body>
</html>
