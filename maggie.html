<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maggie</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:black;
color:white;
text-align:center;
}

/* main card */

.container{
max-width:420px;
margin:auto;
margin-top:40px;
background:rgba(255,255,255,0.08);
padding:40px 20px 60px 20px;
border-radius:35px;
}

/* maggie image */

.maggie{
width:120px;
animation:wag 0.8s infinite ease-in-out;
transform-origin:85% 75%;
}

/* wag animation */

@keyframes wag{

0%{
transform:rotate(5deg);
}

50%{
transform:rotate(-5deg);
}

100%{
transform:rotate(5deg);
}

}

/* text */

h1{
margin-top:10px;
font-size:26px;
}

.subtitle{
opacity:.9;
margin-bottom:25px;
}

/* buttons */

.button{
display:block;
width:100%;
padding:18px;
margin-top:12px;
border-radius:18px;
font-size:18px;
text-decoration:none;
font-weight:bold;
}

.primary{
background:#b5d655;
color:black;
}

.secondary{
background:white;
color:black;
}

/* gallery */

.gallery{
margin-top:40px;
}

.gallery img{
width:100%;
border-radius:16px;
margin-top:12px;
}

</style>

</head>

<body>

<div class="container">

<img src="maggie.png" class="maggie">

<h1>Hi, I'm Maggie</h1>

<p class="subtitle">
I'm the cute one!
</p>

<a href="index.html" class="button primary">
Meet My Pilot
</a>

<a href="#gallery" class="button secondary">
See More Maggie
</a>

</div>


<div id="gallery" class="gallery">

<img src="maggie1.jpg">

<img src="maggie2.jpg">

<img src="maggie3.jpg">

</div>

</body>
</html>
